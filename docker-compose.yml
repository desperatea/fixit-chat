services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fixit_chat
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: pg_isready -U ${DB_USER}
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD} ping
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres/fixit_chat
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SMARTCAPTCHA_KEY=${SMARTCAPTCHA_KEY}
      - GLPI_INTEGRATION_SECRET=${GLPI_INTEGRATION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  admin:
    build: ./admin
    depends_on:
      - backend
    restart: unless-stopped

  widget:
    build: ./widget
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - admin
      - widget
    restart: unless-stopped

  # --- GLPI (for integration testing) ---
  glpi-db:
    image: mysql:8.0
    volumes:
      - glpi_db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: glpi_root_pass
      MYSQL_DATABASE: glpi
      MYSQL_USER: glpi
      MYSQL_PASSWORD: glpi_pass
    healthcheck:
      test: mysqladmin ping -h localhost -u root -pglpi_root_pass
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  glpi:
    image: diouxx/glpi:latest
    ports:
      - "8090:80"
    environment:
      TIMEZONE: Europe/Moscow
    depends_on:
      glpi-db:
        condition: service_healthy
    volumes:
      - glpi_data:/var/www/html/glpi
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  glpi_db_data:
  glpi_data:
